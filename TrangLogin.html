<!DOCTYPE html>
<html>
    <head>
        <title>Đăng Nhập</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        
        <style>
            body {
                font-family: Arial;
                background-image: url("https://i.postimg.cc/90KrCQKV/photo-1615716175512-6547ed615375.avif");
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                background-attachment: fixed;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 0;
            }
            

            .login-card {
                width: 420px;
                max-width: 100%;
                padding: 32px;
                border-radius: 24px;
                background: rgba(255,255,255,0.95);
                box-shadow: 0 10px 30px rgba(0,0,0,0.15);
                display: flex;
                flex-direction: column;
                justify-content: center;
                gap: 18px;
            }

            .login-card h2 {
                text-align: center;
                margin-bottom: 30px;
                color: #333;
            }

            .login-icon {
                font-size: 48px;
                color: #558cec;
                text-align: center;
                margin-bottom: 16px;
            }

            .form-control {
                border-radius: 12px;
                padding: 10px 15px;
                font-size: 16px;
            }

            .input-with-icon {
                position: relative;
            }

            .input-icon {
                position: absolute;
                left: 14px;
                top: 50%;
                transform: translateY(-50%);
                color: #558cec;
                font-size: 18px;
            }

            .input-with-icon .form-control {
                padding-left: 42px;
            }

            .form-footer {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 16px;
                gap: 12px;
                font-size: 14px;
                color: #555;
            }

            .form-footer label {
                display: flex;
                align-items: center;
                gap: 8px;
                cursor: pointer;
            }

            .form-footer input[type="checkbox"] {
                width: 16px;
                height: 16px;
            }

            .forgot-link {
                color: #558cec;
                text-decoration: none;
            }

            .forgot-link:hover {
                text-decoration: underline;
            }

            .btn-primary {
                width: 100%;
                padding: 10px;
                border-radius: 12px;
                font-size: 18px;
                background-color: #558cec;
                border: none;
            }

            .register-link {
                display: block;
                margin-top: 16px;
                text-align: center;
                color: #555;
                text-decoration: none;
                font-size: 14px;
            }

            .register-link:hover {
                text-decoration: underline;
            }

            .bottom-actions {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 12px;
                margin-top: 10px;
            }

            .back-btn {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 100%;
                max-width: 260px;
                padding: 10px 16px;
                border-radius: 12px;
                background-color: #f1f5ff;
                color: #2f4f8b;
                border: 1px solid #d3d9f3;
                text-decoration: none;
                font-size: 16px;
                transition: background-color 0.2s ease, transform 0.15s ease;
            }

            .back-btn:hover {
                background-color: #e6edff;
                transform: translateY(-1px);
            }

            
        </style>
    </head>
    <body>
        <div class="login-card">
            <div class="login-icon"><i class="fa fa-user"></i></div>
            <h2><b>Đăng Nhập</b></h2>
            <form>
                <div class="form-group">
                    <label for="username">Email:</label>
                    <div class="input-with-icon">
                        <span class="input-icon"><i class="fa fa-envelope"></i></span>
                        <input type="email" class="form-control" id="username" placeholder="Nhập email của bạn">
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu:</label>
                    <div class="input-with-icon">
                        <span class="input-icon"><i class="fa fa-lock"></i></span> 
                        <input type="password" class="form-control" id="password" placeholder="Nhập mật khẩu">
                    </div>
                </div>
                <div class="form-footer">
                    <label><input type="checkbox" id="remember"> Ghi nhớ mật khẩu</label>
                    <a href="https://anh201583-wq.github.io/web-html-QMKTDK/" class="forgot-link">Quên mật khẩu?</a>
                </div>
                <button type="button" class="btn btn-primary"
                onclick="window.location.href='https://anh201583-wq.github.io/Webtonghop-html/ '">Đăng Nhập</button>
                <a href="TrangDangKy.html" class="register-link">Chưa có tài khoản? Đăng ký ngay</a>
            </form>
            <div class="bottom-actions">
                <a href="https://anh201583-wq.github.io/TrangBaiTap-html/" class="back-btn">
                    ← Quay lại Trang Bài Tập
                </a>
            </div>
        </div>
    </body>
</html>
